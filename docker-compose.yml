services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: typeahead
      POSTGRES_PASSWORD: typeahead
      POSTGRES_DB: typeahead
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typeahead -d typeahead"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://typeahead:typeahead@postgres:5432/typeahead
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
